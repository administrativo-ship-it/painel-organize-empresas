name: Sync FlowUp Data

on:
  schedule:
    - cron: '*/10 * * * *'   # A cada 10 minutos
  workflow_dispatch:
  push:
    paths:
      - 'scripts/sync_flowup.py'
      - '.github/workflows/sync-flowup.yml'

permissions:
  contents: write

concurrency:
  group: sync-flowup
  cancel-in-progress: false   # Espera o anterior terminar (não cancela)

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sincronizar FlowUp
        env:
          FLOWUP_API_KEY: ${{ secrets.FLOWUP_API_KEY }}
          FLOWUP_SUBDOMAIN: ${{ secrets.FLOWUP_SUBDOMAIN }}
        run: python scripts/sync_flowup.py

      - name: Commit alterações (com retry no push)
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add flowup-data.json
          if git diff --cached --quiet; then
            echo "Sem alterações em flowup-data.json — nada a commitar."
            exit 0
          fi
          git commit -m "chore: auto-sync flowup-data.json [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin main; then
              echo "Push OK na tentativa $i"
              exit 0
            fi
            echo "Push falhou na tentativa $i, retry..."
            sleep 5
          done
          echo "ERRO: push falhou 3 vezes"
          exit 1
