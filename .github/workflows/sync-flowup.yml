name: Sync FlowUp Data

on:
  schedule:
    - cron: '*/5 * * * *'   # A cada 5 minutos
  workflow_dispatch:
  push:
    paths:
      - 'scripts/sync_flowup.py'
      - '.github/workflows/sync-flowup.yml'

permissions:
  contents: write

concurrency:
  group: sync-flowup
  cancel-in-progress: true   # MUDOU: cancela run anterior se um novo vier

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8         # Era 15 — agora sync demora 2-3min
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # Histórico completo para pull --rebase

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sincronizar FlowUp
        env:
          FLOWUP_API_KEY: ${{ secrets.FLOWUP_API_KEY }}
          FLOWUP_SUBDOMAIN: ${{ secrets.FLOWUP_SUBDOMAIN }}
        run: python scripts/sync_flowup.py

      - name: Commit alterações (com retry no push)
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add flowup-data.json
          if git diff --cached --quiet; then
            echo "Sem alterações em flowup-data.json — nada a commitar."
            exit 0
          fi
          git commit -m "chore: auto-sync flowup-data.json [skip ci]"
          # Retry com pull --rebase até 3 vezes (resolve conflitos com runs paralelos)
          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin main; then
              echo "Push OK na tentativa $i"
              exit 0
            fi
            echo "Push falhou na tentativa $i, tentando novamente..."
            sleep 5
          done
          echo "ERRO: push falhou 3 vezes"
          exit 1
